<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Player</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<button class="burger-btn" id="menuBtn"><span></span><span></span><span></span></button>

  <div class="side-menu" id="sideMenu">
    <div class="menu-search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="menuSearch" placeholder="Поиск треков..."/>
    </div>

    <!-- Список треков / результаты поиска -->
    <div class="menu-panel visible" id="panelAllTracks"></div>
    <div class="menu-panel" id="panelSearch"></div>

    <!-- Скрытые панели (не используются в новом дизайне меню) -->
    <div class="menu-panel" id="panelLiked" style="display:none"></div>
    <div class="menu-credits" id="panelCredits"></div>

    <!-- Кнопки внизу -->
    <div class="menu-bottom-btns">
      <a class="menu-bottom-btn" href="credits.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Credits
      </a>
      <a class="menu-bottom-btn" id="menuJoinBtn" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        Join the project
      </a>
    </div>
  </div>

  <div class="bg-particles" id="particles"></div>

  <div class="carousel-wrap" id="carouselWrap">
    <div class="carousel-track" id="carouselTrack">
      <div class="side-card" id="prevCard"></div>
      <div class="side-card" id="ghostCard"></div>
      <div class="player-card" id="playerCard">
        <!-- Клип фона — скругляет углы, album-wrapper выходит за него -->
        <div class="card-clip" id="cardClip"></div>
        <div class="char-name" id="charName"></div>
        <div class="album-wrapper">
          <img id="coverImg" src="" alt=""/>
          <div class="default-cover" id="defaultCover">♪</div>
        </div>
        <div class="actions-row">
          <button class="heart-btn" id="heartBtn">
            <svg class="heart-svg" id="heartSvg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path id="heartPath" d="" fill="none" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
            <img class="heart-liked-img" id="heartLikedImg" src="" alt="" style="display:none; width:36px; height:36px; object-fit:contain;"/>
          </button>
        </div>
        <div class="track-title" id="trackTitle"></div>
        <div class="progress-section">
          <div class="progress-track" id="progressTrack">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-thumb" id="progressThumb">
              <svg viewBox="0 0 24 24" id="thumbHeart">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5 2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53L12 21.35z"/>
              </svg>
            </div>
          </div>
          <div class="time-row">
            <span class="time-label" id="currentTime">0:00</span>
            <span class="time-label" id="totalTime">0:00</span>
          </div>
        </div>
        <div class="controls-row">
          <div class="left-modes">
            <button class="mode-btn" id="shuffleBtn" title="Случайный порядок">
              <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                <path d="m18 14 4 4-4 4"/><path d="m18 2 4 4-4 4"/>
                <path d="M2 18h1.973a4 4 0 0 0 3.3-1.7l5.454-8.6a4 4 0 0 1 3.3-1.7H22"/>
                <path d="M2 6h1.972a4 4 0 0 1 3.6 2.2"/>
                <path d="M22 18h-6.041a4 4 0 0 1-3.3-1.8l-.359-.45"/>
              </svg>
            </button>
            <button class="mode-btn" id="repeatBtn" title="Повтор трека">
              <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                <polyline points="17 1 21 5 17 9"/>
                <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <polyline points="7 23 3 19 7 15"/>
                <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              </svg>
            </button>
          </div>
          <button class="ctrl-btn" id="prevBtn">
            <svg class="skip-svg" viewBox="0 0 24 24">
              <polygon points="19,20 9,12 19,4"/>
              <line x1="5" y1="4" x2="5" y2="20" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="ctrl-btn play-btn" id="playBtn">
            <svg id="playIcon" viewBox="0 0 24 24" width="22" height="22"><polygon points="6,3 20,12 6,21"/></svg>
            <div id="pauseIcon"><span></span><span></span></div>
          </button>
          <button class="ctrl-btn" id="nextBtn">
            <svg class="skip-svg" viewBox="0 0 24 24">
              <polygon points="5,4 15,12 5,20"/>
              <line x1="19" y1="4" x2="19" y2="20" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="volume-btn" id="volumeBtn" title="Громкость">
            <svg id="volIcon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
              <!-- Динамик — всегда виден -->
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <!-- Малая дуга — тихо (>0) -->
              <path id="volWave1" d="M14.5 9a3.5 3.5 0 0 1 0 6"/>
              <!-- Большая дуга — громко (>0.5) -->
              <path id="volWave2" d="M17.5 6.5a7 7 0 0 1 0 11"/>
            </svg>
            <div class="volume-popup" id="volumePopup">
              <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.02" value="1"/>
            </div>
          </button>
        </div>
        <div class="credits-row" id="creditsRow">
          <div class="credit-item">
            <span class="credit-label" id="artLabel">Art by</span>
            <a class="credit-link" id="artLink" href="#" target="_blank">
              <span id="artName"></span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
          </div>
          <div class="credit-item right">
            <span class="credit-label" id="musicLabel">Music by</span>
            <a class="credit-link" id="musicLink" href="#" target="_blank">
              <span id="musicName"></span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
          </div>
        </div>
      </div><!-- /.player-card -->
      <div class="side-card" id="nextCard"></div>
    </div>
  </div>

<audio id="audio"></audio>

<!-- Скрытые img для предзагрузки — браузер держит их в памяти постоянно -->
<div id="preloadContainer" style="display:none" aria-hidden="true">
  <img id="preload0"/><img id="preload1"/><img id="preload2"/><img id="preload3"/><img id="preload4"/>
</div>

<script src="tracks.js"></script>
<script src="player.js"></script>
</body>
</html>
